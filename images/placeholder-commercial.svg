<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#1A1A1A"/>
  <!-- Building outline -->
  <rect x="120" y="100" width="560" height="400" rx="2" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.4"/>
  <!-- Floors -->
  <line x1="120" y1="233" x2="680" y2="233" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="120" y1="366" x2="680" y2="366" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Office windows row 1 -->
  <rect x="155" y="120" width="80" height="90" rx="2" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <rect x="260" y="120" width="80" height="90" rx="2" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <rect x="365" y="120" width="80" height="90" rx="2" fill="rgba(244,96,12,0.08)" stroke="rgba(244,96,12,0.2)" stroke-width="1.5"/>
  <rect x="470" y="120" width="80" height="90" rx="2" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <rect x="575" y="120" width="80" height="90" rx="2" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Office windows row 2 -->
  <rect x="155" y="254" width="80" height="90" rx="2" fill="rgba(244,96,12,0.06)" stroke="rgba(244,96,12,0.15)" stroke-width="1.5"/>
  <rect x="260" y="254" width="80" height="90" rx="2" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <rect x="365" y="254" width="80" height="90" rx="2" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <rect x="470" y="254" width="80" height="90" rx="2" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <rect x="575" y="254" width="80" height="90" rx="2" fill="rgba(200,16,46,0.08)" stroke="rgba(200,16,46,0.2)" stroke-width="1.5"/>
  <!-- Entrance -->
  <rect x="330" y="400" width="140" height="100" rx="2" fill="none" stroke="#F4600C" stroke-width="2" opacity="0.4"/>
  <!-- Accent bar on building top -->
  <rect x="120" y="100" width="560" height="6" rx="1" fill="url(#buildGrad)" opacity="0.6"/>
  <defs>
    <linearGradient id="buildGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#F4600C"/>
    </linearGradient>
  </defs>
  <!-- Label -->
  <text x="400" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="3">COMMERCIAL OFFICE</text>
  <text x="400" y="562" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="2">PHOTO COMING SOON</text>
</svg>
