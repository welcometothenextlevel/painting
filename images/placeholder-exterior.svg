<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#1A1A1A"/>
  <!-- House outline -->
  <polygon points="400,80 660,280 660,500 140,500 140,280" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.4"/>
  <!-- Roof -->
  <polygon points="400,80 660,280 140,280" fill="none" stroke="#F4600C" stroke-width="2.5" opacity="0.5"/>
  <!-- Door -->
  <rect x="340" y="360" width="120" height="140" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Windows -->
  <rect x="175" y="310" width="110" height="90" rx="2" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <rect x="515" y="310" width="110" height="90" rx="2" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Ground line -->
  <line x1="80" y1="500" x2="720" y2="500" stroke="#F4600C" stroke-width="1.5" opacity="0.3"/>
  <!-- Label -->
  <text x="400" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="3">EXTERIOR PAINTING</text>
  <text x="400" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="2">PHOTO COMING SOON</text>
</svg>
