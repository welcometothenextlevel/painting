<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#1A1A1A"/>
  <!-- Feature wall grid pattern -->
  <rect x="100" y="80" width="600" height="440" rx="4" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Color blocks to suggest feature wall -->
  <rect x="100" y="80" width="200" height="220" rx="2" fill="rgba(200,16,46,0.12)"/>
  <rect x="300" y="80" width="200" height="220" rx="2" fill="rgba(244,96,12,0.10)"/>
  <rect x="500" y="80" width="200" height="220" rx="2" fill="rgba(200,16,46,0.08)"/>
  <rect x="100" y="300" width="200" height="220" rx="2" fill="rgba(244,96,12,0.07)"/>
  <rect x="300" y="300" width="200" height="220" rx="2" fill="rgba(200,16,46,0.13)"/>
  <rect x="500" y="300" width="200" height="220" rx="2" fill="rgba(244,96,12,0.09)"/>
  <!-- Grid lines -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#F4600C" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="80" x2="300" y2="520" stroke="#F4600C" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="80" x2="500" y2="520" stroke="#F4600C" stroke-width="1" opacity="0.3"/>
  <!-- Star/accent -->
  <circle cx="400" cy="300" r="30" fill="none" stroke="#F4600C" stroke-width="2.5" opacity="0.5"/>
  <circle cx="400" cy="300" r="6" fill="#F4600C" opacity="0.6"/>
  <!-- Label -->
  <text x="400" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="3">FEATURE WALL</text>
  <text x="400" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="2">PHOTO COMING SOON</text>
</svg>
