<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#1A1A1A"/>
  <!-- Room outline -->
  <rect x="80" y="80" width="640" height="440" rx="4" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.4"/>
  <!-- Floor line -->
  <line x1="80" y1="440" x2="720" y2="440" stroke="#F4600C" stroke-width="2" opacity="0.4"/>
  <!-- Left wall -->
  <line x1="80" y1="80" x2="80" y2="440" stroke="#F4600C" stroke-width="2" opacity="0.4"/>
  <!-- Window -->
  <rect x="280" y="120" width="240" height="180" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <line x1="400" y1="120" x2="400" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <line x1="280" y1="210" x2="520" y2="210" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Paint roller icon -->
  <rect x="348" y="340" width="104" height="28" rx="4" fill="none" stroke="#F4600C" stroke-width="2.5" opacity="0.6"/>
  <line x1="400" y1="368" x2="400" y2="400" stroke="#F4600C" stroke-width="2.5" opacity="0.6"/>
  <ellipse cx="400" cy="408" rx="12" ry="8" fill="none" stroke="#F4600C" stroke-width="2.5" opacity="0.6"/>
  <!-- Label -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="3">INTERIOR PAINTING</text>
  <text x="400" y="514" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" letter-spacing="2">PHOTO COMING SOON</text>
</svg>
